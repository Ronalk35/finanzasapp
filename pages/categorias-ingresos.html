<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorías de Ingresos – FinanzasApp</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="app-layout" id="app-wrapper"></div>

<div class="modal-overlay" id="modalCat">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Nueva categoría</h3>
      <button class="modal-close" onclick="closeModal('modalCat')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nombre de la categoría *</label>
        <input type="text" id="catNombre" class="form-control" placeholder="Ej: Freelance" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalCat')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCategoria()">Guardar</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
initTheme();
injectLayout('cat-ingresos', 'Categorías de Ingresos');
if (!requireAuth()) throw new Error('no auth');



async function onPageReady() {
  document.getElementById('pageContent').innerHTML =
  `<div class="page-loading"><div class="loading-spinner"></div> Cargando datos...</div>`;
  await loadCategorias();
  renderPage();
}

function renderPage() {
  const content = document.getElementById('pageContent');
  const cats = State.categoriasIngresos;

  content.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Categorías de ingresos</div>
          <div class="card-subtitle">Administra las categorías disponibles para registrar ingresos</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('modalCat')">➕ Nueva categoría</button>
      </div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Tipo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            ${cats.length ? cats.map((c,i)=>`
              <tr>
                <td class="text-muted">${i+1}</td>
                <td><span class="badge badge-green">${c.Nombre}</span></td>
                <td><span class="badge badge-gray">${c.EsDefault==='true'||c.IDUsuario==='DEFAULT' ? 'Por defecto' : 'Personalizada'}</span></td>
                <td>
                  ${(c.EsDefault==='true'||c.IDUsuario==='DEFAULT') ? '<span class="text-muted" style="font-size:12px">No eliminable</span>' :
                  `<button class="btn btn-ghost btn-sm btn-icon" onclick="eliminarCategoria('${c.ID}')">🗑️</button>`}
                </td>
              </tr>
            `).join('') : `<tr><td colspan="4"><div class="empty-state"><div class="empty-state-icon">🏷️</div><div class="empty-state-title">Sin categorías</div></div></td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function guardarCategoria() {
  const nombre = document.getElementById('catNombre').value.trim();
  if (!nombre) return showToast('Ingresa un nombre', 'error');

  try {
    const res = await apiCall({ action:'addCategoriaIngreso', ID:genId('CI'), IDUsuario:State.user.id, Nombre:nombre, EsDefault:'false' });
    if (res.success) {
      State.categoriasIngresos.push(res.data);
      showToast('Categoría creada','success');
      closeModal('modalCat');
      document.getElementById('catNombre').value='';
      renderPage();
    } else showToast(res.error||'Error','error');
  } catch { showToast('Error de conexión','error'); }
}

async function eliminarCategoria(id) {
  if (!confirm('¿Eliminar esta categoría?')) return;
  try {
    const res = await apiCall({ action:'deleteCategoriaIngreso', ID:id });
    if (res.success) {
      State.categoriasIngresos = State.categoriasIngresos.filter(x=>x.ID!==id);
      showToast('Categoría eliminada','success');
      renderPage();
    } else showToast(res.error||'Error','error');
  } catch { showToast('Error de conexión','error'); }
}

onPageReady();
</script>
</body>
</html>
